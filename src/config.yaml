site:
  name: クリニックマッチ
  site: 'https://clinicmatch.org'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: orcPxI47GSa-cRvY11tUe6iGg2IO_RPvnA1q95iEM3M
  # 複数の Search Console プロパティを使う場合は追加
  googleSiteVerificationIds:
    - orcPxI47GSa-cRvY11tUe6iGg2IO_RPvnA1q95iEM3M

# Default SEO metadata
metadata:
  title:
    default: クリニックマッチ
    template: '%s — クリニックマッチ'
  description: "美容医療機器の中古売買・仲介。クリニックマッチは医療機関のニーズに合った機器選びをサポートします。"
  robots:
    index: true
    follow: true
  openGraph:
    site_name: クリニックマッチ
    images:
      - url: '~/assets/images/ogp.png'
        width: 1200
        height: 628
    type: website

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: "G-HPBRHZ68XF" # Google tag (gtag.js)

ui:
  theme: 'light' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
